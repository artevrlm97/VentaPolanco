<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inmobiliaria</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; color: #1a1a1a; height: 100vh; display: flex; flex-direction: column; }
  header { background: #fff; border-bottom: 1px solid #e8e8e0; padding: 14px 24px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; z-index: 10; }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: #2d6a4f; }
  .filters { display: flex; gap: 8px; margin-left: auto; }
  .filters select, .filters input { padding: 8px 12px; border: 1px solid #e0e0d8; border-radius: 8px; font-size: 13px; background: #fafaf8; color: #1a1a1a; outline: none; }
  .filters input { width: 200px; }
  .main { display: flex; flex: 1; overflow: hidden; }
  .lista { width: 320px; flex-shrink: 0; overflow-y: auto; background: #fff; border-right: 1px solid #e8e8e0; }
  .lista-header { padding: 12px 16px; font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid #f0f0e8; position: sticky; top: 0; background: #fff; z-index: 1; }
  .card { padding: 12px 14px; border-bottom: 1px solid #f0f0e8; cursor: pointer; display: flex; gap: 10px; }
  .card:hover { background: #f9f9f5; }
  .card.activa { background: #f0f7f4; border-left: 3px solid #2d6a4f; }
  .card-img { width: 68px; height: 56px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: #eee; }
  .card-nofoto { width: 68px; height: 56px; border-radius: 6px; background: #f0f0e8; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .card-info { flex: 1; min-width: 0; }
  .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 99px; text-transform: uppercase; margin-bottom: 3px; }
  .badge-venta { background: #e8f5ee; color: #1a6640; }
  .badge-alquiler { background: #e8eef8; color: #1a3d6e; }
  .card-precio { font-size: 14px; font-weight: 700; }
  .card-nombre { font-size: 12px; color: #666; margin: 1px 0 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-meta { font-size: 11px; color: #aaa; }
  #map { flex: 1; }
  .mapboxgl-popup-content { border-radius: 10px !important; padding: 0 !important; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important; width: 220px; font-family: 'Segoe UI', sans-serif; }
  .mapboxgl-popup-close-button { font-size: 16px; padding: 6px 8px; color: #666; background: transparent; }
  .popup-img { width: 100%; height: 120px; object-fit: cover; display: block; }
  .popup-nofoto { width: 100%; height: 70px; background: #f0f0e8; display: flex; align-items: center; justify-content: center; font-size: 28px; }
  .popup-body { padding: 10px 12px; }
  .popup-precio { font-size: 15px; font-weight: 700; margin: 4px 0 2px; }
  .popup-nombre { font-size: 12px; color: #666; margin-bottom: 6px; }
  .popup-meta { font-size: 11px; color: #999; margin-bottom: 4px; }
  .popup-zona { font-size: 11px; color: #2d6a4f; font-weight: 600; }
  .marker-bubble { background: #fff; border: 2px solid #2d6a4f; border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: 700; color: #2d6a4f; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.2); white-space: nowrap; transition: all 0.15s; }
  .marker-bubble:hover, .marker-bubble.activo { background: #2d6a4f; color: #fff; }
  .marker-bubble.alquiler { border-color: #1a5fa8; color: #1a5fa8; }
  .marker-bubble.alquiler:hover, .marker-bubble.alquiler.activo { background: #1a5fa8; color: #fff; }
  .vacio { padding: 32px 16px; text-align: center; color: #bbb; font-size: 13px; }
  .lista::-webkit-scrollbar { width: 3px; }
  .lista::-webkit-scrollbar-thumb { background: #ddd; border-radius: 99px; }
</style>
</head>
<body>
<header>
  <div class="logo">inmo<span>mapa</span></div>
  <div class="filters">
    <input type="text" id="buscar" placeholder="🔍 Buscar..." oninput="filtrar()">
    <select id="filtroTipo" onchange="filtrar()">
      <option value="">Todos</option>
      <option value="venta">Venta</option>
      <option value="alquiler">Alquiler</option>
    </select>
    <select id="filtroPrecio" onchange="filtrar()">
      <option value="">Cualquier precio</option>
      <option value="0-100000">Hasta $100,000</option>
      <option value="100000-250000">$100k – $250k</option>
      <option value="250000-99999999">Más de $250k</option>
    </select>
  </div>
</header>
<div class="main">
  <div class="lista">
    <div class="lista-header" id="listaHeader">Cargando...</div>
    <div id="listaContenido"></div>
  </div>
  <div id="map"></div>
</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
var TOKEN   = 'pk.eyJ1IjoiYXJ0ZXZybG0iLCJhIjoiY21wMWQyOTBqMDBhMjJ0bXc4emE1anhncCJ9.irsS6a8_nXVdrdhfL9PCyA';
var CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2EiYdNqfHC4uaVTuhAqexZuwI9CTl5UQA-VAFVBepeqU4ip8wTkIyvqFLeafKxDFLE7OrmdqDcjV7/pub?output=csv';

var propiedades = [], marcadores = [], popupActual = null;

function limpiarCoord(v) {
  if (!v) return NaN;
  // elimina cualquier caracter que no sea digito, punto o guion normal
  var s = v.toString().replace(/[^0-9.-]/g, '');
  return parseFloat(s);
}

function fmt(precio, tipo) {
  var n = parseFloat(precio);
  if (isNaN(n)) return '';
  return '$' + n.toLocaleString('es-BO') + (tipo === 'alquiler' ? '/mes' : '');
}

// Iniciar mapa
mapboxgl.accessToken = TOKEN;
var map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/streets-v12',
  center: [-63.1812, -17.7863],
  zoom: 12
});
map.addControl(new mapboxgl.NavigationControl(), 'top-right');
map.on('load', cargarPropiedades);

function cargarPropiedades() {
  // Intentar directo primero, si falla usar proxy
  Papa.parse(CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: procesarDatos,
    error: function() {
      // fallback con proxy
      var proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(CSV_URL);
      Papa.parse(proxy, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: procesarDatos,
        error: function(e) {
          document.getElementById('listaHeader').textContent = 'Error cargando datos';
        }
      });
    }
  });
}

function procesarDatos(res) {
  propiedades = res.data
    .filter(function(p) {
      var lat = limpiarCoord(p.lat);
      var lng = limpiarCoord(p.lng);
      return p.nombre && !isNaN(lat) && !isNaN(lng);
    })
    .map(function(p, i) { p._id = i; return p; });

  if (!propiedades.length) {
    document.getElementById('listaHeader').textContent = 'No se encontraron propiedades';
    return;
  }

  var bounds = new mapboxgl.LngLatBounds();

  propiedades.forEach(function(p) {
    var lat = limpiarCoord(p.lat);
    var lng = limpiarCoord(p.lng);

    var el = document.createElement('div');
    el.className = 'marker-bubble ' + (p.tipo === 'alquiler' ? 'alquiler' : 'venta');
    var n = parseFloat(p.precio);
    el.textContent = isNaN(n) ? '' : (n >= 1000 ? '$' + Math.round(n/1000) + 'k' : '$' + n) + (p.tipo === 'alquiler' ? '/mes' : '');

    new mapboxgl.Marker({ element: el, anchor: 'center' })
      .setLngLat([lng, lat])
      .addTo(map);

    el.addEventListener('click', function() { abrirPopup(p); });
    marcadores.push({ id: p._id, el: el });
    bounds.extend([lng, lat]);
  });

  if (!bounds.isEmpty()) map.fitBounds(bounds, { padding: 80, maxZoom: 14 });
  renderLista(propiedades);
}

function abrirPopup(p) {
  if (popupActual) popupActual.remove();
  var lat = limpiarCoord(p.lat), lng = limpiarCoord(p.lng);
  var img = p.foto ? '<img class="popup-img" src="' + p.foto + '" onerror="this.style.display=\'none\'">' : '<div class="popup-nofoto">🏠</div>';
  var meta = [];
  if (p.hab && p.hab !== '0') meta.push('🛏 ' + p.hab);
  if (p.banos && p.banos !== '0') meta.push('🚿 ' + p.banos);
  if (p.m2) meta.push('📐 ' + p.m2 + 'm²');
  popupActual = new mapboxgl.Popup({ offset: 15, maxWidth: '240px' })
    .setLngLat([lng, lat])
    .setHTML(img + '<div class="popup-body">' +
      '<div class="badge badge-' + (p.tipo||'venta') + '">' + (p.tipo||'') + '</div>' +
      '<div class="popup-precio">' + fmt(p.precio, p.tipo) + '</div>' +
      '<div class="popup-nombre">' + p.nombre + '</div>' +
      (meta.length ? '<div class="popup-meta">' + meta.join(' · ') + '</div>' : '') +
      (p.descripcion ? '<div class="popup-meta">' + p.descripcion + '</div>' : '') +
      (p.zona ? '<div class="popup-zona">📍 ' + p.zona + '</div>' : '') +
      '</div>')
    .addTo(map);
  activarCard(p._id);
}

function activarCard(id) {
  document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('activa'); });
  marcadores.forEach(function(m) { m.el.classList.toggle('activo', m.id === id); });
  var card = document.getElementById('card-' + id);
  if (card) { card.classList.add('activa'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
}

function irAPropiedad(id) {
  var p = propiedades[id];
  if (!p) return;
  var lat = limpiarCoord(p.lat), lng = limpiarCoord(p.lng);
  map.flyTo({ center: [lng, lat], zoom: 15, speed: 1.2 });
  abrirPopup(p);
}

function filtrar() {
  var busq = document.getElementById('buscar').value.toLowerCase();
  var tipo = document.getElementById('filtroTipo').value;
  var rango = document.getElementById('filtroPrecio').value;
  var lista = propiedades.filter(function(p) {
    if (tipo && p.tipo !== tipo) return false;
    if (busq && !(p.nombre + ' ' + (p.zona||'')).toLowerCase().includes(busq)) return false;
    if (rango) {
      var pts = rango.split('-').map(Number), n = parseFloat(p.precio);
      if (n < pts[0] || n > pts[1]) return false;
    }
    return true;
  });
  var ids = {};
  lista.forEach(function(p) { ids[p._id] = true; });
  marcadores.forEach(function(m) { m.el.style.display = ids[m.id] ? '' : 'none'; });
  renderLista(lista);
}

function renderLista(lista) {
  document.getElementById('listaHeader').textContent = lista.length + ' propiedad' + (lista.length !== 1 ? 'es' : '') + ' encontrada' + (lista.length !== 1 ? 's' : '');
  if (!lista.length) { document.getElementById('listaContenido').innerHTML = '<div class="vacio">Sin resultados</div>'; return; }
  document.getElementById('listaContenido').innerHTML = lista.map(function(p) {
    var meta = [];
    if (p.hab && p.hab !== '0') meta.push('🛏 ' + p.hab);
    if (p.banos && p.banos !== '0') meta.push('🚿 ' + p.banos);
    if (p.m2) meta.push('📐 ' + p.m2 + 'm²');
    var img = p.foto
      ? '<img class="card-img" src="' + p.foto + '" onerror="this.outerHTML=\'<div class=\\\'card-nofoto\\\'>🏠</div>\'">'
      : '<div class="card-nofoto">🏠</div>';
    return '<div class="card" id="card-' + p._id + '" onclick="irAPropiedad(' + p._id + ')">' +
      img + '<div class="card-info">' +
      '<span class="badge badge-' + (p.tipo||'venta') + '">' + (p.tipo||'') + '</span>' +
      '<div class="card-precio">' + fmt(p.precio, p.tipo) + '</div>' +
      '<div class="card-nombre">' + p.nombre + '</div>' +
      '<div class="card-meta">' + meta.join(' · ') + '</div>' +
      '</div></div>';
  }).join('');
}
</script>
</body>
</html>
